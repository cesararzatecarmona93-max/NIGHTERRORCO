<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Protocolo Genesis V2: Arquitectura de Orquestacion</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div id="genesis-interface">
    <div class="header">
      <div class="brand">
        <span>GENESIS V2</span>
        <span style="font-size: 10px; color: var(--vio); letter-spacing: 1px; opacity: 0.8;">// ORCHESTRATION ARCHITECTURE</span>
      </div>
      <div class="status-badge" style="background: rgba(45, 227, 167, 0.1); color: var(--ok); border: 1px solid rgba(45, 227, 167, 0.3);">
        SYSVEC: ACTIVE
      </div>
    </div>

    <div class="sidebar" id="agent-list">
      <!-- Agents injected by JS -->
    </div>

    <div class="terminal-window">
      <canvas id="matrix-bg"></canvas>
      <div class="terminal-content" id="terminal-output">
        <!-- Output injected by JS -->
      </div>
    </div>

    <div class="footer">
      <div>GEMA96-NIGHTERRORCO • Protocolo Genesis V2 • Validated</div>
      <div style="margin-left: auto;">
        <button id="run-btn" style="background: transparent; border: 1px solid var(--vio); color: var(--vio); padding: 4px 12px; font-family: var(--mono); cursor: pointer; border-radius: 4px; font-size: 11px; text-transform: uppercase; transition: all 0.2s;">
          Initialize Protocol
        </button>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
  <script>
    // Button hover effect
    const btn = document.getElementById('run-btn');
    if(btn) {
      btn.addEventListener('mouseover', () => {
        btn.style.background = 'rgba(162, 76, 255, 0.1)';
        btn.style.boxShadow = '0 0 10px rgba(162, 76, 255, 0.2)';
      });
      btn.addEventListener('mouseout', () => {
        btn.style.background = 'transparent';
        btn.style.boxShadow = 'none';
      });
    }
  </script>
</body>
</html>
