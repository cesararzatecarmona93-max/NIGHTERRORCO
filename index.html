<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Genesis V2 - Protocolo de Orquestación</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500;600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0f14;
            --sidebar-bg: #10151d;
            --text-color: #e6f1ff;
            --accent-color: #00d1ff;
            --highlight-color: #a24cff;
            --border-color: #1b2433;
            --font-mono: 'Fira Code', monospace;
            --font-sans: 'Inter', sans-serif;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-sans);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }
        .sidebar {
            width: 300px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 20px;
            overflow-y: auto;
        }
        .sidebar-header {
            margin-bottom: 20px;
            font-weight: 700;
            font-size: 1.2rem;
            color: var(--accent-color);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .agent-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .agent-item {
            padding: 12px 16px;
            margin-bottom: 8px;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s, color 0.2s;
            font-family: var(--font-mono);
            font-size: 0.9rem;
            border: 1px solid transparent;
        }
        .agent-item:hover {
            background-color: rgba(0, 209, 255, 0.1);
            color: var(--accent-color);
            border-color: rgba(0, 209, 255, 0.2);
        }
        .agent-item.active {
            background-color: rgba(162, 76, 255, 0.15);
            color: var(--highlight-color);
            border-color: var(--highlight-color);
        }
        .terminal-window {
            flex: 1;
            padding: 30px;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            font-family: var(--font-mono);
        }
        .terminal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
        }
        .terminal-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--accent-color);
        }
        .sysvec-badge {
            background-color: rgba(162, 76, 255, 0.2);
            color: var(--highlight-color);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
        }
        .terminal-content {
            flex: 1;
            white-space: pre-wrap;
            line-height: 1.6;
            color: #dceeff;
            font-size: 0.95rem;
        }
        .cursor {
            display: inline-block;
            width: 8px;
            height: 1.2em;
            background-color: var(--accent-color);
            vertical-align: text-bottom;
            animation: blink 1s step-end infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">Protocolo Genesis V2</div>
        <ul class="agent-list" id="agent-list">
            <!-- Agents will be populated by script.js -->
        </ul>
    </div>
    <div class="terminal-window">
        <div class="terminal-header">
            <span class="terminal-title" id="terminal-title">Inicializando...</span>
            <span class="sysvec-badge" id="sysvec-badge">SYSTEM READY</span>
        </div>
        <div class="terminal-content" id="terminal-content"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
