<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Protocolo Genesis V2</title>
<style>
:root{
  --bg:#0b0f14; --panel:#10151d; --ink:#e6f1ff;
  --cyan:#00d1ff; --vio:#a24cff; --grid:#0e1622;
  --ok:#2de3a7; --warn:#ffbe3b;
  --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
  --sans: Inter, system-ui, -apple-system, Segoe UI, Roboto, "Helvetica Neue", Arial, "Noto Sans", "Liberation Sans", sans-serif;
}
*{box-sizing:border-box}
html,body{height:100%; overflow: hidden;}
body{margin:0;background:radial-gradient(1200px 800px at 70% -10%, #151b28 0%, #0b0f14 60%, #06080c 100%);color:var(--ink);font-family:var(--sans);letter-spacing:.2px}

.header{height: 60px; display:flex;align-items:center;padding:0 24px;border-bottom:1px solid #121a26;background:rgba(10,14,20,.9)}
.badge{font:600 11px/1 var(--mono);border:1px solid #1e2a3c;padding:5px 9px;border-radius:6px;color:#8fb3ff;}

.main-container {
    display: flex;
    height: calc(100vh - 60px);
}

.sidebar {
    width: 300px;
    background: #0d121a;
    border-right: 1px solid #1b2433;
    padding: 20px;
    overflow-y: auto;
}

.agent-item {
    padding: 15px;
    border: 1px solid #1b2433;
    border-radius: 8px;
    margin-bottom: 12px;
    cursor: pointer;
    transition: all 0.2s;
    background: #151b28;
}

.agent-item:hover {
    border-color: var(--cyan);
    transform: translateY(-2px);
}

.agent-item.active {
    border-color: var(--vio);
    background: rgba(162, 76, 255, 0.1);
}

.agent-name {
    font-weight: 700;
    color: var(--ink);
    margin-bottom: 4px;
}

.agent-role {
    font-size: 11px;
    color: #8fb3ff;
    font-family: var(--mono);
}

.terminal-window {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 20px;
    background: #0b0f14;
    position: relative;
}

#terminal-output {
    flex: 1;
    overflow-y: auto;
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.6;
    padding-bottom: 20px;
    color: #a9c1ff;
}

.input-area {
    margin-top: 10px;
    border-top: 1px solid #1b2433;
    padding-top: 10px;
}

#terminal-input {
    width: 100%;
    background: #0f141d;
    border: 1px solid #1b2433;
    border-radius: 6px;
    padding: 12px;
    color: var(--cyan);
    font-family: var(--mono);
    outline: none;
    transition: border 0.2s;
}
#terminal-input:focus {
    border-color: var(--cyan);
}

/* Scrollbar */
::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: #0b0f14; }
::-webkit-scrollbar-thumb { background: #1b2433; border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: #2b4a6a; }

.response-block {
    margin-bottom: 15px;
    animation: fadeIn 0.3s ease;
}

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

</style>
</head>
<body>

<header class="header">
  <div class="badge">GENESIS V2</div>
  <div style="margin-left:12px; font-weight:700;">Arquitectura de Orquestacion</div>
</header>

<div class="main-container">
    <div class="sidebar" id="agent-sidebar">
        <!-- Agents injected by script.js -->
    </div>

    <div class="terminal-window">
        <div id="terminal-output"></div>
        <div class="input-area">
            <input type="text" id="terminal-input" placeholder="Ingrese instrucción para el agente activo..." autocomplete="off">
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
