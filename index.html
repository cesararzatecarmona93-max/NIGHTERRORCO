<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GENESIS V2 | Protocolo de Orquestacion</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;600&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

  <div class="sidebar">
    <div style="margin-bottom: 20px; font-weight: 700; font-size: 16px; color: var(--cyan); display: flex; align-items: center; gap: 10px;">
      <span style="font-size: 20px;">❖</span> GENESIS V2
    </div>
    <div id="agent-list" style="display: flex; flex-direction: column; gap: 8px;">
      <!-- Agents will be injected here via JS -->
    </div>

    <div class="status-bar">
      <span>SYSVEC: 0xAetherShadow</span>
      <span>STATUS: ONLINE</span>
    </div>
  </div>

  <div class="terminal-window">
    <div class="terminal-header">
      <span>// TERMINAL ACCESS :: ROOT@GENESIS-V2</span>
      <span id="clock">00:00:00</span>
    </div>
    <div id="terminal-content" class="terminal-content">
      <span class="cursor"></span>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
