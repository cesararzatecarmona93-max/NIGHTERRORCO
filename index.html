<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="description" content="Protocolo Genesis V2: Arquitectura de Orquestación y Llaves Maestras">
<title>Genesis V2 — Protocolo de Orquestación</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0b0f14; --panel:#10151d; --ink:#e6f1ff;
  --cyan:#00d1ff; --vio:#a24cff; --grid:#0e1622;
  --ok:#2de3a7; --warn:#ffbe3b;
  --mono: 'Fira Code', monospace;
  --sans: 'Inter', sans-serif;
}
*{box-sizing:border-box}
html,body{height:100%; overflow:hidden;}
body{
  margin:0;
  background: var(--bg);
  color:var(--ink);
  font-family:var(--sans);
  display: flex;
  flex-direction: column;
}

#genesis-interface {
  display: grid;
  grid-template-columns: 250px 1fr;
  grid-template-rows: 60px 1fr;
  height: 100vh;
  width: 100vw;
  background: var(--grid);
}

.header {
  grid-column: 1 / -1;
  background: var(--panel);
  border-bottom: 1px solid #1b2433;
  display: flex;
  align-items: center;
  padding: 0 24px;
  justify-content: space-between;
}

.brand {
  font-family: var(--mono);
  font-weight: 700;
  font-size: 18px;
  color: var(--cyan);
  text-transform: uppercase;
  letter-spacing: 1px;
}

.sidebar {
  background: var(--panel);
  border-right: 1px solid #1b2433;
  padding: 20px;
  overflow-y: auto;
}

.agent-item {
  padding: 12px;
  margin-bottom: 8px;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.2s ease;
  border: 1px solid transparent;
}

.agent-item:hover {
  background: rgba(0, 209, 255, 0.05);
  border-color: rgba(0, 209, 255, 0.2);
}

.agent-item.active {
  background: rgba(0, 209, 255, 0.1);
  border-color: var(--cyan);
}

.agent-name {
  font-family: var(--sans);
  font-weight: 600;
  font-size: 14px;
  color: var(--ink);
  margin-bottom: 4px;
}

.agent-role {
  font-family: var(--mono);
  font-size: 11px;
  color: #8fb3ff;
  opacity: 0.8;
}

.terminal-window {
  background: var(--bg);
  padding: 24px;
  font-family: var(--mono);
  font-size: 14px;
  line-height: 1.6;
  color: var(--ok); /* Default terminal color */
  overflow-y: auto;
  position: relative;
}

#terminal-output {
  white-space: pre-wrap;
}

/* Scrollbar styling */
::-webkit-scrollbar {
  width: 8px;
}
::-webkit-scrollbar-track {
  background: var(--bg);
}
::-webkit-scrollbar-thumb {
  background: #1b2433;
  border-radius: 4px;
}
::-webkit-scrollbar-thumb:hover {
  background: #2b3a4d;
}
</style>
</head>
<body>

<div id="genesis-interface">
  <div class="header">
    <div class="brand">Genesis V2 // Protocol Core</div>
    <div style="font-family: var(--mono); font-size: 12px; color: var(--warn);">SYSTEM STATUS: ONLINE</div>
  </div>

  <div class="sidebar">
    <!-- Agents will be populated here via JS -->
  </div>

  <div class="terminal-window">
    <div id="terminal-output">
      > SYSTEM READY.
      > WAITING FOR AGENT SELECTION...
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
