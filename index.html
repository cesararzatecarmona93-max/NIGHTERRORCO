<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Protocolo Genesis V2: Arquitectura de Orquestacion</title>
<style>
:root{
  --bg:#0b0f14; --panel:#10151d; --ink:#e6f1ff;
  --cyan:#00d1ff; --vio:#a24cff; --grid:#0e1622;
  --ok:#2de3a7; --warn:#ffbe3b;
  --mono: 'Fira Code', ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
  --sans: Inter, system-ui, -apple-system, Segoe UI, Roboto, "Helvetica Neue", Arial, "Noto Sans", "Liberation Sans", sans-serif;
}
@import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Inter:wght@400;600;700&display=swap');

*{box-sizing:border-box}
html,body{height:100%; overflow: hidden;}
body{
  margin:0;
  background: var(--bg);
  color:var(--ink);
  font-family:var(--sans);
  display: flex;
  justify-content: center;
  align-items: center;
}

#matrix-bg {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 0;
  opacity: 0.15;
}

#genesis-interface {
  position: relative;
  z-index: 10;
  width: 95vw;
  height: 90vh;
  background: rgba(16, 21, 29, 0.85);
  backdrop-filter: blur(10px);
  border: 1px solid #1b2433;
  border-radius: 14px;
  box-shadow: 0 0 0 1px rgba(0,209,255,.05), 0 35px 60px rgba(0,0,0,.35);
  display: grid;
  grid-template-columns: 300px 1fr;
  overflow: hidden;
}

.sidebar {
  background: rgba(11, 15, 20, 0.6);
  border-right: 1px solid #1b2433;
  padding: 20px;
  overflow-y: auto;
}

.sidebar-header {
  font-family: var(--mono);
  font-size: 14px;
  color: var(--cyan);
  margin-bottom: 20px;
  letter-spacing: 1px;
  text-transform: uppercase;
  border-bottom: 1px solid #1b2433;
  padding-bottom: 10px;
}

.agent-item {
  padding: 12px;
  margin-bottom: 8px;
  border: 1px solid transparent;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.2s ease;
}

.agent-item:hover {
  background: rgba(0, 209, 255, 0.05);
  border-color: rgba(0, 209, 255, 0.2);
}

.agent-item.active {
  background: rgba(0, 209, 255, 0.1);
  border-color: var(--cyan);
  box-shadow: 0 0 10px rgba(0, 209, 255, 0.1);
}

.agent-name {
  font-family: var(--sans);
  font-weight: 700;
  font-size: 14px;
  color: var(--ink);
  margin-bottom: 4px;
}

.agent-role {
  font-family: var(--mono);
  font-size: 11px;
  color: #8fb3ff;
}

.terminal-window {
  display: flex;
  flex-direction: column;
  background: rgba(6, 8, 12, 0.95);
}

.terminal-header {
  padding: 12px 20px;
  border-bottom: 1px solid #1b2433;
  font-family: var(--mono);
  font-size: 12px;
  color: var(--warn);
  background: rgba(14, 22, 34, 0.5);
  display: flex;
  align-items: center;
  gap: 10px;
}

.terminal-header::before {
  content: '';
  display: inline-block;
  width: 8px;
  height: 8px;
  background: var(--ok);
  border-radius: 50%;
  box-shadow: 0 0 8px var(--ok);
}

.terminal-content {
  flex: 1;
  padding: 24px;
  font-family: var(--mono);
  font-size: 13px;
  line-height: 1.6;
  color: var(--cyan);
  overflow-y: auto;
  white-space: pre-wrap;
  text-shadow: 0 0 5px rgba(0, 209, 255, 0.3);
}

/* Scrollbar styling */
::-webkit-scrollbar {
  width: 8px;
}
::-webkit-scrollbar-track {
  background: #0b0f14;
}
::-webkit-scrollbar-thumb {
  background: #1e2a3c;
  border-radius: 4px;
}
::-webkit-scrollbar-thumb:hover {
  background: #2b4a6a;
}

@media (max-width: 768px) {
  #genesis-interface {
    grid-template-columns: 1fr;
    grid-template-rows: auto 1fr;
    height: 100vh;
    width: 100vw;
    border-radius: 0;
  }
  .sidebar {
    height: 150px;
    border-right: none;
    border-bottom: 1px solid #1b2433;
  }
}
</style>
</head>
<body>
<canvas id="matrix-bg"></canvas>

<div id="genesis-interface">
  <div class="sidebar">
    <div class="sidebar-header">GENESIS V2 // AGENTS</div>
    <!-- Agent items will be injected here via JS -->
  </div>
  <div class="terminal-window">
    <div class="terminal-header">STATUS: ONLINE // <span>CORE SYSTEM</span></div>
    <div class="terminal-content">Initializing Genesis V2 Protocol...</div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
