<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Protocolo Genesis V2 | Arquitectura de Orquestacion</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="matrix"></canvas>
    <div class="crt-overlay"></div>

    <div class="container">
        <aside class="sidebar">
            <div class="brand">Protocolo<br>Genesis V2</div>
            <nav id="agent-list" class="agent-list">

            </nav>
        </aside>

        <main class="main-content">
            <div class="header-panel">
                <h1 id="agent-title" class="agent-title">Initializing...</h1>
                <div id="agent-role" class="agent-role">System Check...</div>
            </div>

            <div id="terminal-window" class="terminal-window">
                <span id="terminal-text" class="terminal-text"></span><span class="cursor"></span>
            </div>
        </main>
    </div>

    <script src="script.js"></script>

</html>
