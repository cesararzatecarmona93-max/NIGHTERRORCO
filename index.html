<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Genesis V2 — Master Orchestration Node</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="status-bar">
  <span>Genesis Protocol V2.0</span>
  <span class="status-online">● SYSTEM ONLINE</span>
</div>

<div class="app-container">
  <!-- Master Console (Left) -->
  <aside class="console-panel">
    <div class="master-identity">
      <span class="glitch-text">CONTEXT ENGINEER</span>
      <div style="font-size:11px; color:#567;">Apex-Level Cognitive Architect</div>
    </div>

    <div id="terminal" class="terminal-window">
      <div class="log-line log-info">> System initialized.</div>
      <div class="log-line log-info">> Awaiting command...</div>
    </div>

    <div class="command-input-area">
      <button id="btn-genesis" class="secondary">INITIALIZE GENESIS PROTOCOL</button>

      <div style="font-size:10px; color:#567; margin-top:10px;">CUSTOM GENERATION VECTOR:</div>
      <div class="input-group">
        <input type="text" id="custom-domain" placeholder="Enter target domain (e.g. Marketing)...">
        <button id="btn-create">SPAWN</button>
      </div>
    </div>
  </aside>

  <!-- Agent Stage (Right) -->
  <main class="agent-stage">
    <div class="stage-header">
      <div class="stage-title">ACTIVE AGENT NODES</div>
      <div style="font: 11px var(--mono); color:#567;">CLUSTER STATUS: STABLE</div>
    </div>

    <div id="agent-grid" class="grid">
      <!-- Dynamic Agents Rendered Here -->
    </div>
  </main>
</div>

<script src="script.js"></script>
</body>
</html>
