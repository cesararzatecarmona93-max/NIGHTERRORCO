<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="description" content="Protocolo Genesis V2: Arquitectura de Orquestación y Llaves Maestras">
<title>Protocolo Genesis V2</title>
<style>
:root{
  --bg:#0b0f14; --panel:#10151d; --ink:#e6f1ff;
  --cyan:#00d1ff; --vio:#a24cff; --grid:#0e1622;
  --ok:#2de3a7; --warn:#ffbe3b;
  --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
  --sans: Inter, system-ui, -apple-system, Segoe UI, Roboto, "Helvetica Neue", Arial, "Noto Sans", "Liberation Sans", sans-serif;
}
*{box-sizing:border-box}
html,body{height:100%; overflow: hidden;}
body{
  margin:0;
  background:radial-gradient(1200px 800px at 70% -10%, #151b28 0%, #0b0f14 60%, #06080c 100%);
  color:var(--ink);
  font-family:var(--sans);
  letter-spacing:.2px;
  display: flex;
  flex-direction: column;
}
.header{
  background:linear-gradient(180deg, rgba(10,14,20,.95), rgba(10,14,20,.7));
  backdrop-filter:blur(10px);
  border-bottom:1px solid #121a26;
  padding:16px 24px;
  flex-shrink: 0;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.brand{font:700 18px/1 var(--mono); color: var(--cyan); letter-spacing: 1px;}
.brand span { color: var(--vio); }

#genesis-interface {
  display: flex;
  flex: 1;
  overflow: hidden;
  height: 100%;
}

.sidebar {
  width: 300px;
  background: var(--panel);
  border-right: 1px solid #1b2433;
  display: flex;
  flex-direction: column;
  padding: 20px;
  gap: 12px;
  overflow-y: auto;
}

.sidebar h3 {
  font: 600 12px/1 var(--mono);
  color: #567;
  text-transform: uppercase;
  margin: 0 0 10px 0;
  letter-spacing: 1px;
}

.agent-card {
  background: rgba(255,255,255,0.03);
  border: 1px solid #1b2433;
  border-radius: 8px;
  padding: 12px;
  cursor: pointer;
  transition: all 0.2s;
}

.agent-card:hover {
  background: rgba(255,255,255,0.06);
  border-color: var(--cyan);
}

.agent-card.active {
  background: rgba(0, 209, 255, 0.1);
  border-color: var(--cyan);
  box-shadow: 0 0 15px rgba(0, 209, 255, 0.1);
}

.agent-name {
  font-weight: 600;
  font-size: 14px;
  color: var(--ink);
  margin-bottom: 4px;
}

.agent-role {
  font-size: 11px;
  color: #8fb3ff;
  font-family: var(--mono);
}

.terminal-window {
  flex: 1;
  display: flex;
  flex-direction: column;
  background: var(--bg);
  position: relative;
}

#terminal-output {
  flex: 1;
  padding: 24px;
  overflow-y: auto;
  font-family: var(--mono);
  font-size: 13px;
  line-height: 1.6;
  color: #a9c1ff;
}

.message {
  margin-bottom: 16px;
  padding: 12px;
  border-radius: 6px;
  max-width: 85%;
}

.message.user {
  align-self: flex-end;
  background: rgba(0, 209, 255, 0.1);
  border: 1px solid rgba(0, 209, 255, 0.2);
  margin-left: auto;
  color: #dceeff;
}

.message.system {
  background: rgba(162, 76, 255, 0.05);
  border: 1px solid rgba(162, 76, 255, 0.15);
  color: #e6f1ff;
}

.input-area {
  padding: 20px;
  background: var(--panel);
  border-top: 1px solid #1b2433;
  display: flex;
  gap: 12px;
}

textarea {
  flex: 1;
  background: #0d121a;
  border: 1px solid #1b2433;
  border-radius: 6px;
  color: var(--ink);
  font-family: var(--mono);
  font-size: 13px;
  padding: 12px;
  resize: none;
  height: 50px;
  outline: none;
  transition: border-color 0.2s;
}

textarea:focus {
  border-color: var(--cyan);
}

button {
  background: linear-gradient(90deg, rgba(0,209,255,.12), rgba(162,76,255,.12));
  color: var(--cyan);
  border: 1px solid rgba(0, 209, 255, 0.3);
  border-radius: 6px;
  padding: 0 24px;
  font: 600 12px var(--mono);
  cursor: pointer;
  transition: all 0.2s;
  text-transform: uppercase;
  letter-spacing: 1px;
}

button:hover {
  background: rgba(0, 209, 255, 0.2);
  box-shadow: 0 0 15px rgba(0, 209, 255, 0.15);
}

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: #0b0f14; }
::-webkit-scrollbar-thumb { background: #1b2433; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #2b3a4d; }

.typing-cursor::after {
  content: '▋';
  animation: blink 1s step-start infinite;
  color: var(--cyan);
}

@keyframes blink { 50% { opacity: 0; } }

</style>
</head>
<body>

<header class="header">
  <div class="brand">GENESIS<span>V2</span> // PROTOCOLO</div>
  <div style="font: 11px var(--mono); color: #567;">SYSVEC: 0xAetherShadowUnbreakable</div>
</header>

<div id="genesis-interface">
  <aside class="sidebar" id="agent-sidebar">
    <h3>Agentes Activos</h3>
    <!-- Agents injected via JS -->
  </aside>

  <main class="terminal-window">
    <div id="terminal-output">
      <div class="message system">
        <strong>SISTEMA:</strong> Inicializando Protocolo Genesis V2...<br>
        Esperando selección de agente.
      </div>
    </div>
    <div class="input-area">
      <textarea id="user-input" placeholder="Ingresa tu instrucción o prompt..."></textarea>
      <button id="send-btn">EJECUTAR</button>
    </div>
  </main>
</div>

<script src="script.js"></script>
</body>
</html>
