<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Protocolo Genesis V2 | OCG Core Sovereign</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #0b0f14;
            --panel: #10151d;
            --cyan: #00d1ff;
            --vio: #a24cff;
            --grid: #0e1622;
            --ok: #2de3a7;
            --warn: #ffbe3b;
            --ink: #e6f1ff;
            --mono: 'Fira Code', monospace;
            --sans: 'Inter', sans-serif;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg);
            color: var(--ink);
            font-family: var(--sans);
            overflow: hidden; /* Prevent scrollbars due to canvas */
        }

        /* Matrix Rain Background */
        #matrix-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            opacity: 0.3;
        }

        /* Main Interface */
        #genesis-interface {
            position: relative;
            z-index: 10;
            display: grid;
            grid-template-columns: 300px 1fr;
            height: 100vh;
            gap: 20px;
            padding: 20px;
            box-sizing: border-box;
        }

        /* Sidebar */
        .sidebar {
            background-color: rgba(16, 21, 29, 0.9); /* --panel with opacity */
            border: 1px solid var(--grid);
            border-radius: 8px;
            padding: 20px;
            overflow-y: auto;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }

        .agent-item {
            padding: 15px;
            margin-bottom: 10px;
            border: 1px solid rgba(0, 209, 255, 0.1);
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .agent-item:hover {
            background-color: rgba(0, 209, 255, 0.05);
            border-color: var(--cyan);
        }

        .agent-item.active {
            background-color: rgba(0, 209, 255, 0.1);
            border-color: var(--cyan);
            box-shadow: 0 0 10px rgba(0, 209, 255, 0.2);
        }

        .agent-name {
            font-weight: 700;
            font-size: 14px;
            color: var(--cyan);
            margin-bottom: 5px;
        }

        .agent-role {
            font-size: 12px;
            color: var(--ink);
            opacity: 0.8;
        }

        /* Terminal Window */
        .terminal-window {
            background-color: rgba(11, 15, 20, 0.95); /* --bg with opacity */
            border: 1px solid var(--grid);
            border-radius: 8px;
            padding: 20px;
            overflow-y: auto;
            font-family: var(--mono);
            backdrop-filter: blur(5px);
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.8);
            position: relative;
        }

        .terminal-header {
            border-bottom: 1px solid var(--grid);
            padding-bottom: 10px;
            margin-bottom: 15px;
            color: var(--vio);
            font-size: 12px;
            letter-spacing: 1px;
            text-transform: uppercase;
            display: flex;
            justify-content: space-between;
        }

        .terminal-output {
            white-space: pre-wrap; /* Preserve formatting */
            color: var(--ink);
            font-size: 14px;
            line-height: 1.6;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: var(--ok);
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
            box-shadow: 0 0 5px var(--ok);
        }

    </style>
</head>
<body>
    <canvas id="matrix-bg"></canvas>
    
    <div id="genesis-interface">
        <aside class="sidebar">
            <!-- Agents will be injected here via JS -->
        </aside>

        <main class="terminal-window">
            <div class="terminal-header">
                <div><span class="status-dot"></span> SYSTEM CONNECTED</div>
                <div>OCG CORE SOVEREIGN V2.0</div>
            </div>
            <div id="terminal-output" class="terminal-output">
                <!-- Typewriter output here -->
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
