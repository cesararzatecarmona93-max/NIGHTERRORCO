<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Genesis V2: Arquitectura de Orquestacion</title>
<style>
:root {
  --bg: #0b0f14; --panel: #10151d; --ink: #e6f1ff;
  --cyan: #00d1ff; --vio: #a24cff; --grid: #0e1622;
  --ok: #2de3a7; --warn: #ffbe3b;
  --mono: "Fira Code", ui-monospace, SFMono-Regular, monospace;
  --sans: Inter, system-ui, sans-serif;
}
* { box-sizing: border-box; }
body {
  margin: 0; background: var(--bg); color: var(--ink);
  font-family: var(--sans); overflow: hidden;
  display: flex; height: 100vh;
}
#matrix-bg {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  z-index: 0; opacity: 0.15; pointer-events: none;
}
.app-container {
  display: grid; grid-template-columns: 280px 1fr;
  width: 100%; height: 100%; z-index: 1;
}
.sidebar {
  background: rgba(16, 21, 29, 0.85);
  backdrop-filter: blur(10px);
  border-right: 1px solid #1b2433;
  display: flex; flex-direction: column;
}
.sidebar-header {
  padding: 20px; border-bottom: 1px solid #1b2433;
  font-family: var(--mono); font-weight: 700; color: var(--cyan);
  letter-spacing: 1px;
}
.agent-list {
  flex: 1; overflow-y: auto; padding: 10px;
}
.agent-item {
  padding: 12px; margin-bottom: 8px;
  border: 1px solid transparent; border-radius: 6px;
  cursor: pointer; transition: all 0.2s;
}
.agent-item:hover {
  background: rgba(0, 209, 255, 0.05); border-color: rgba(0, 209, 255, 0.2);
}
.agent-item.active {
  background: rgba(0, 209, 255, 0.1); border-color: var(--cyan);
}
.agent-name {
  font-family: var(--mono); font-weight: 600; font-size: 13px; color: #fff;
}
.agent-role {
  font-size: 11px; color: #8fb3ff; margin-top: 4px;
}
.main-content {
  display: flex; flex-direction: column; background: rgba(11, 15, 20, 0.9);
}
.terminal-window {
  flex: 1; padding: 20px; overflow-y: auto;
  font-family: var(--mono); font-size: 14px; line-height: 1.6;
  white-space: pre-wrap; color: #dceeff;
}
.input-area {
  padding: 20px; border-top: 1px solid #1b2433;
  background: var(--panel);
}
input[type="text"] {
  width: 100%; background: #0d121a; border: 1px solid #1a2333;
  padding: 12px; color: var(--cyan); font-family: var(--mono);
  border-radius: 6px; outline: none; transition: border-color 0.2s;
}
input[type="text"]:focus {
  border-color: var(--cyan); box-shadow: 0 0 10px rgba(0,209,255,0.1);
}
.user-line { color: var(--warn); margin-top: 10px; }
.agent-response { color: var(--ok); margin-top: 10px; margin-bottom: 20px; }
::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: #0b0f14; }
::-webkit-scrollbar-thumb { background: #1b2433; border-radius: 4px; }
</style>
</head>
<body>
<canvas id="matrix-bg"></canvas>
<div class="app-container">
  <div class="sidebar" id="agent-sidebar">
    <div class="sidebar-header">GENESIS V2 // PROTOCOL</div>
    <div class="agent-list" id="agent-list">
      <!-- Generated by script.js -->
    </div>
  </div>
  <div class="main-content">
    <div class="terminal-window" id="terminal-window">
      <div id="terminal-output"></div>
    </div>
    <div class="input-area">
      <input type="text" id="user-input" placeholder="Ingresa comando o instrucción..." autocomplete="off">
    </div>
  </div>
</div>
<script src="script.js"></script>
</body>
</html>
