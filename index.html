<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GENESIS V2 | PROTOCOL ORCHESTRATION</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;600&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="matrix-canvas"></canvas>
    <div class="scanline-overlay"></div>

    <div class="app-container">
        <header>
            <div class="brand">
                <div class="brand-title">GENESIS V2</div>
                <div class="brand-subtitle">Architecture of Orchestration & Master Keys</div>
            </div>
            <div class="status-indicator">
                <div class="status-dot"></div>
                <span style="font-family: var(--font-code); font-size: 0.8rem; color: var(--accent-cyan);">SYSTEM ONLINE</span>
            </div>
        </header>

        <main>
            <aside class="agent-sidebar" id="agent-sidebar">
                <!-- Agents injected by script.js -->
            </aside>

            <section class="terminal-window">
                <div class="terminal-header">
                    <span>root@genesis-v2:~#</span>
                    <span>SECURE CONNECTION [ENCRYPTED]</span>
                </div>
                <div class="terminal-content" id="terminal-content">
                    <!-- Output stream -->
                </div>
                <div class="user-input-area">
                    <input type="text" id="user-input" placeholder="Enter instruction or raw prompt..." autocomplete="off">
                    <button id="run-btn" class="run-btn">Execute</button>
                </div>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
