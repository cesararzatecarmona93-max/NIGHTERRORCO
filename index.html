<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Protocolo Genesis V2 | Arquitectura de Orquestacion</title>
<style>
:root{
  --bg:#0b0f14; --panel:#10151d; --ink:#e6f1ff;
  --cyan:#00d1ff; --vio:#a24cff; --grid:#0e1622;
  --ok:#2de3a7; --warn:#ffbe3b;
  --mono: 'Fira Code', ui-monospace, SFMono-Regular, Consolas, monospace;
  --sans: 'Inter', system-ui, -apple-system, sans-serif;
}
@import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;600&family=Inter:wght@300;400;600&display=swap');

*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);height:100vh;overflow:hidden;display:flex}

/* Background Canvas */
#matrix-bg {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; opacity: 0.15; pointer-events: none;
}

/* Layout */
.sidebar {
  width: 280px; background: var(--panel); border-right: 1px solid #1b2433; z-index: 10;
  display: flex; flex-direction: column; padding: 20px; box-shadow: 5px 0 20px rgba(0,0,0,0.5);
}
.main { flex: 1; position: relative; z-index: 10; display: flex; flex-direction: column; padding: 20px; }

/* Sidebar Elements */
.brand { font-family: var(--mono); font-weight: 700; font-size: 14px; letter-spacing: 1px; color: var(--cyan); margin-bottom: 30px; display: flex; align-items: center; gap: 10px; }
.brand::before { content: ''; width: 12px; height: 12px; background: var(--cyan); border-radius: 50%; box-shadow: 0 0 10px var(--cyan); }

.agent-list { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 10px; }
.agent-item {
  padding: 12px; border: 1px solid transparent; border-radius: 8px; cursor: pointer; transition: all 0.2s;
  background: rgba(255,255,255,0.02);
}
.agent-item:hover { background: rgba(255,255,255,0.05); border-color: #1b2433; }
.agent-item.active { background: linear-gradient(90deg, rgba(0,209,255,0.1), transparent); border-left: 3px solid var(--cyan); border-color: #1b2433; }
.agent-name { font-weight: 600; font-size: 13px; color: #fff; margin-bottom: 4px; }
.agent-role { font-size: 11px; color: #789; font-family: var(--mono); }

/* Terminal Window */
.terminal {
  flex: 1; background: rgba(16,21,29,0.95); border: 1px solid #1b2433; border-radius: 12px;
  box-shadow: 0 0 40px rgba(0,0,0,0.5); overflow: hidden; display: flex; flex-direction: column;
  backdrop-filter: blur(10px);
}
.term-header {
  background: #151b26; padding: 10px 15px; border-bottom: 1px solid #1b2433; display: flex; align-items: center; justify-content: space-between;
}
.term-title { font-family: var(--mono); font-size: 12px; color: #789; }
.term-status { font-family: var(--mono); font-size: 10px; color: var(--ok); }
.term-body {
  flex: 1; padding: 20px; font-family: var(--mono); font-size: 13px; color: #a9c1ff; line-height: 1.6;
  overflow-y: auto; white-space: pre-wrap;
}
.term-input-area {
  border-top: 1px solid #1b2433; padding: 15px; background: #0e1219; display: flex; gap: 10px; align-items: center;
}
.prompt-char { color: var(--vio); font-weight: bold; }
#user-input {
  flex: 1; background: transparent; border: none; color: #fff; font-family: var(--mono); font-size: 13px; outline: none;
}
</style>
</head>
<body>

<canvas id="matrix-bg"></canvas>

<aside class="sidebar">
  <div class="brand">GENESIS V2</div>
  <ul class="agent-list" id="agent-list">
    <!-- Agents loaded via JS -->
  </ul>
</aside>

<main class="main">
  <div class="terminal">
    <div class="term-header">
      <span class="term-title" id="term-title">System Idle</span>
      <span class="term-status">● ONLINE</span>
    </div>
    <div class="term-body" id="output">Initialize Protocolo Genesis V2...
Select an agent to begin session.</div>
    <div class="term-input-area">
      <span class="prompt-char">➜</span>
      <input type="text" id="user-input" placeholder="Enter command or prompt..." autocomplete="off">
    </div>
  </div>
</main>

<script src="script.js"></script>
<script>
// Matrix Rain
const canvas = document.getElementById('matrix-bg');
const ctx = canvas.getContext('2d');
let width, height;

function resize() {
  width = canvas.width = window.innerWidth;
  height = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

const cols = Math.floor(width / 20);
const ypos = Array(cols).fill(0);

function matrix() {
  ctx.fillStyle = '#0b0f1410';
  ctx.fillRect(0, 0, width, height);
  ctx.fillStyle = '#00d1ff';
  ctx.font = '15px monospace';

  ypos.forEach((y, ind) => {
    const text = String.fromCharCode(Math.random() * 128);
    const x = ind * 20;
    ctx.fillText(text, x, y);
    if (y > 100 + Math.random() * 10000) ypos[ind] = 0;
    else ypos[ind] = y + 20;
  });
}
setInterval(matrix, 50);

// App Logic
const agentListEl = document.getElementById('agent-list');
const outputEl = document.getElementById('output');
const titleEl = document.getElementById('term-title');
const inputEl = document.getElementById('user-input');

let activeAgent = null;
let typeTimer = null;

// Initialize Sidebar
Object.values(AGENTS).forEach(agent => {
  const li = document.createElement('li');
  li.className = 'agent-item';
  li.innerHTML = `<div class="agent-name">${agent.name.split('(')[0]}</div><div class="agent-role">${agent.role.substring(0, 30)}...</div>`;
  li.onclick = () => selectAgent(agent, li);
  agentListEl.appendChild(li);
});

function selectAgent(agent, el) {
  // Update UI
  document.querySelectorAll('.agent-item').forEach(i => i.classList.remove('active'));
  el.classList.add('active');
  activeAgent = agent;
  titleEl.textContent = `SESSION: ${agent.id} [${agent.sysVec || 'STD-PROTO'}]`;

  // Stop previous typing
  if (typeTimer) clearTimeout(typeTimer);

  // Clear and Type Output
  outputEl.textContent = '';
  typeWriter(`> INITIATING HANDSHAKE WITH ${agent.id}...\n> LOADING SYSTEM PROMPT...\n\n${agent.systemPrompt}\n\n> READY FOR INPUT.`);
}

function typeWriter(text, i = 0) {
  if (i < text.length) {
    outputEl.textContent += text.charAt(i);
    outputEl.scrollTop = outputEl.scrollHeight;
    typeTimer = setTimeout(() => typeWriter(text, i + 1), 5); // Fast typing
  } else {
    typeTimer = null;
  }
}

inputEl.addEventListener('keypress', (e) => {
  if (e.key === 'Enter' && activeAgent) {
    const text = inputEl.value;
    inputEl.value = '';
    
    // Append User Input
    const userLine = document.createElement('div');
    userLine.style.color = '#fff';
    userLine.style.marginTop = '10px';
    userLine.textContent = `➜ ${text}`;
    outputEl.appendChild(userLine);
    
    // Simulate Processing
    const processingLine = document.createElement('div');
    processingLine.style.color = '#567';
    processingLine.textContent = `> ${activeAgent.id} is processing...`;
    outputEl.appendChild(processingLine);
    
    // Mock Response
    setTimeout(() => {
      outputEl.removeChild(processingLine);
      const resp = `\n[${activeAgent.id} RESPONSE]\nProcessed input: "${text}"\nUsing logic: ${activeAgent.role}\n[END STREAM]`;

      // Append response char by char
      let j = 0;
      function typeResponse() {
        if (j < resp.length) {
          outputEl.textContent += resp.charAt(j);
           outputEl.scrollTop = outputEl.scrollHeight;
          j++;
          setTimeout(typeResponse, 10);
        }
      }
      typeResponse();
    }, 1000);
  }
});
</script>
</body>
</html>
