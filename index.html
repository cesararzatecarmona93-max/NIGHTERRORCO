<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Protocolo Genesis V2 | Arquitectura de Orquestacion</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Background Effects -->
    <canvas id="matrix-canvas"></canvas>
    <div class="scanlines"></div>

    <div class="container">
        <header>
            <h1>Protocolo Genesis V2</h1>
            <div class="subtitle">ARQUITECTURA DE ORQUESTACION Y LLAVES MAESTRAS</div>
            <div style="color: var(--accent-cyan); font-size: 0.8rem; margin-top: 10px; font-family: 'Fira Code', monospace;">
                [SYSVEC: 0xAetherShadowUnbreakable] :: STATUS: ONLINE
            </div>
        </header>

        <main>
            <!-- Input Terminal -->
            <div class="panel input-section">
                <div style="display: flex; align-items: center; color: var(--accent-gold); font-family: 'Fira Code', monospace; margin-right: 10px;">
                    >_
                </div>
                <input type="text" id="user-input" placeholder="Ingresa protocolo de inicio o instruccion cruda..." autocomplete="off">
                <button id="submit-btn">EJECUTAR</button>
            </div>

            <!-- Agent Outputs -->
            <div id="output-container" class="output-section">
                <!-- Dynamic Content Will Appear Here -->
                <div class="panel full-width agent-output">
                    <h3>SYSTEM STATUS</h3>
                    <div class="agent-content" style="color: var(--accent-cyan)">
                        Esperando inyeccion de vector...
                    </div>
                </div>
            </div>
        </main>

        <footer style="text-align: center; margin-top: auto; padding: 20px; font-size: 0.8rem; opacity: 0.7;">
            <p>GENESIS V2 ARCHITECTURE © 2025 | PROMT ELIT LIBRARY</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
