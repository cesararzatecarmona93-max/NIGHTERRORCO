<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="description" content="Protocolo Genesis V2: Arquitectura de Orquestacion y Llaves Maestras.">
<title>Genesis V2 — Protocolo de Orquestación</title>
<style>
:root{
  --bg:#0b0f14; --panel:#10151d; --ink:#e6f1ff;
  --cyan:#00d1ff; --vio:#a24cff; --grid:#0e1622;
  --ok:#2de3a7; --warn:#ffbe3b;
  --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
  --sans: Inter, system-ui, -apple-system, Segoe UI, Roboto, "Helvetica Neue", Arial, "Noto Sans", "Liberation Sans", sans-serif;
}
*{box-sizing:border-box}
html,body{height:100%}
body{margin:0;background:radial-gradient(1200px 800px at 70% -10%, #151b28 0%, #0b0f14 60%, #06080c 100%);color:var(--ink);font-family:var(--sans);letter-spacing:.2px;overflow:hidden;}

#matrix-bg {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: -1;
  opacity: 0.15; /* Subtle background */
  pointer-events: none;
}

#genesis-interface {
  display: grid;
  grid-template-columns: 320px 1fr;
  height: 100vh;
  width: 100vw;
  overflow: hidden;
}

.sidebar {
  background: rgba(16, 21, 29, 0.85); /* --panel with opacity */
  border-right: 1px solid #1b2433;
  padding: 24px;
  overflow-y: auto;
  backdrop-filter: blur(12px);
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.terminal-window {
  background: rgba(11, 15, 20, 0.6); /* --bg with opacity */
  padding: 48px;
  font-family: var(--mono);
  color: var(--ok); /* Greenish terminal text */
  overflow-y: auto;
  white-space: pre-wrap; /* Preserve formatting */
  line-height: 1.6;
  font-size: 14px;
  position: relative;
}

.terminal-window::before {
  content: "";
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
  background-size: 100% 2px, 3px 100%;
  pointer-events: none;
  z-index: 10;
  opacity: 0.4;
}

.sidebar-header {
  font-family: var(--mono);
  color: var(--cyan);
  font-size: 16px;
  font-weight: bold;
  margin-bottom: 12px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  border-bottom: 1px solid #1b2433;
  padding-bottom: 16px;
  text-shadow: 0 0 10px rgba(0, 209, 255, 0.4);
}

.agent-item {
  padding: 16px;
  background: rgba(255, 255, 255, 0.02);
  border: 1px solid rgba(255, 255, 255, 0.05);
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.2s cubic-bezier(0.23, 1, 0.32, 1);
  position: relative;
  overflow: hidden;
}

.agent-item:hover {
  background: rgba(255, 255, 255, 0.05);
  border-color: var(--cyan);
  transform: translateX(4px);
}

.agent-item.active {
  background: rgba(0, 209, 255, 0.08);
  border-color: var(--cyan);
  box-shadow: 0 0 20px rgba(0, 209, 255, 0.15);
}

.agent-item.active::after {
  content: '';
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  width: 3px;
  background: var(--cyan);
  box-shadow: 0 0 8px var(--cyan);
}

.agent-name {
  font-weight: 700;
  color: var(--ink);
  margin-bottom: 6px;
  font-size: 13px;
  letter-spacing: 0.3px;
}

.agent-role {
  font-family: var(--mono);
  font-size: 10px;
  color: #8fb3ff; /* Muted blue */
  opacity: 0.7;
  line-height: 1.4;
}

/* Scrollbar styling */
::-webkit-scrollbar {
  width: 6px;
  height: 6px;
}
::-webkit-scrollbar-track {
  background: var(--bg);
}
::-webkit-scrollbar-thumb {
  background: #1b2433;
  border-radius: 3px;
}
::-webkit-scrollbar-thumb:hover {
  background: var(--cyan);
}

@media (max-width: 768px) {
  #genesis-interface {
    grid-template-columns: 1fr;
    grid-template-rows: 200px 1fr;
  }
  .sidebar {
    border-right: none;
    border-bottom: 1px solid #1b2433;
  }
}
</style>
</head>
<body>

<canvas id="matrix-bg"></canvas>

<div id="genesis-interface">
  <aside class="sidebar">
    <!-- Populated by script.js -->
  </aside>
  <main class="terminal-window">
    <!-- Populated by script.js -->
  </main>
</div>

<script src="script.js"></script>
</body>
</html>
