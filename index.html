<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Genesis V2 — Protocolo de Orquestación</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">
  <div class="wrap brand">
    <div class="badge">SYSVEC 0xAether</div>
    <div>
      <h1 class="title neon">Genesis V2 Protocol</h1>
      <p style="margin:0;font-size:12px;color:#8fb3ff">Orquestación de Llaves Maestras &amp; Arquitectura de Agentes</p>
    </div>
  </div>
</header>

<main class="wrap main-container">
  <!-- Context Engineer Console -->
  <section class="console-panel" id="context-engineer">
    <div class="console-header">
      <span class="console-title">>_ CONTEXT ENGINEER (GOD MODE)</span>
      <span class="badge" style="border-color:var(--ok);color:var(--ok)">ONLINE</span>
    </div>

    <div style="margin-bottom:12px;color:#96a7c2;font-size:13px">
      [DIRECTIVA PRIMARIA]: Transmutar instrucciones crudas en Llaves Maestras (Master Key Prompts).
    </div>

    <textarea id="raw-input" class="input-area" placeholder="Ingrese su instrucción cruda o seleccione un protocolo de agente... (Ej: 'Necesito un auditor de seguridad para mi código')"></textarea>

    <div style="display:flex;gap:12px;margin-bottom:16px">
      <button id="transmute-btn" class="action-btn">
        <span>⚡ TRANSMUTE SIGNAL</span>
      </button>
      <button id="clear-btn" class="action-btn" style="background:transparent;border-color:#2a4d6f">
        <span>RESET</span>
      </button>
    </div>

    <div id="process-log" class="log-output"></div>
  </section>

  <!-- Active Agents Grid -->
  <section>
    <h2 style="font-size:16px;color:#cfe1ff;margin-bottom:16px;border-bottom:1px solid #1b2433;padding-bottom:8px">ACTIVE AGENTS <span id="agent-count" style="color:var(--cyan)">(0)</span></h2>
    <div id="agents-grid" class="agents-grid">
      <!-- Dynamic Agents will be spawned here -->
    </div>
  </section>
</main>

<script src="script.js"></script>
</body>
</html>
