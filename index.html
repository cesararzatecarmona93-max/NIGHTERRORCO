<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Genesis V2 Protocol | Orquestacion y Llaves Maestras</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="sidebar">
        <!-- Brand and Agent list injected by script.js, but we keep structure ready -->
    </div>
    <div class="terminal-window">
        <div class="header-status">
            <div>PROTOCOL: <span class="status-value">GENESIS V2</span></div>
            <div>STATUS: <span class="status-value" id="sys-status">INIT</span></div>
            <div>AGENT: <span class="status-value" id="sys-agent">--</span></div>
        </div>
        <div class="terminal-content">
            <pre id="terminal-text"></pre>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
