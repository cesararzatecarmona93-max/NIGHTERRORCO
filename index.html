<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="description" content="Protocolo Genesis V2: Arquitectura de Orquestacion y Llaves Maestras">
<title>Genesis V2 — Arquitectura de Orquestacion</title>
<style>
:root{
  --bg:#0b0f14; --panel:#10151d; --ink:#e6f1ff;
  --cyan:#00d1ff; --vio:#a24cff; --grid:#0e1622;
  --ok:#2de3a7; --warn:#ffbe3b;
  --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
  --sans: Inter, system-ui, -apple-system, Segoe UI, Roboto, "Helvetica Neue", Arial, "Noto Sans", "Liberation Sans", sans-serif;
}
*{box-sizing:border-box}
html,body{height:100%; overflow: hidden;}
body{
    margin:0;
    background:radial-gradient(1200px 800px at 70% -10%, #151b28 0%, #0b0f14 60%, #06080c 100%);
    color:var(--ink);
    font-family:var(--sans);
    letter-spacing:.2px;
    display: flex;
    flex-direction: column;
}

.header{
    background:linear-gradient(180deg, rgba(10,14,20,.95), rgba(10,14,20,.7));
    backdrop-filter:blur(10px);
    border-bottom:1px solid #121a26;
    padding:16px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
}
.brand{display:flex;align-items:center;gap:12px}
.badge{font:600 11px/1 var(--mono);letter-spacing:.4px;border:1px solid #1e2a3c;padding:5px 9px;border-radius:6px;color:#8fb3ff;text-transform:uppercase}
.title{font-size:20px;font-weight:700;margin:0}
.neon{text-shadow:0 0 12px rgba(0,209,255,.5), 0 0 24px rgba(162,76,255,.4)}

#genesis-interface {
    flex: 1;
    display: grid;
    grid-template-columns: 300px 1fr;
    gap: 0;
    overflow: hidden;
}

.sidebar {
    background: var(--panel);
    border-right: 1px solid #1b2433;
    padding: 20px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.sidebar h3 {
    margin: 0 0 16px;
    font-size: 14px;
    color: #8fb3ff;
    text-transform: uppercase;
    font-family: var(--mono);
}

.agent-btn {
    background: linear-gradient(90deg, rgba(0,209,255,.05), rgba(162,76,255,.05));
    border: 1px solid #203149;
    border-radius: 8px;
    padding: 12px 16px;
    color: #dceeff;
    font: 600 13px var(--sans);
    cursor: pointer;
    text-align: left;
    transition: .2s all;
}

.agent-btn:hover {
    background: linear-gradient(90deg, rgba(0,209,255,.15), rgba(162,76,255,.15));
    border-color: #2b4a6a;
    transform: translateX(4px);
}

.terminal-window {
    display: flex;
    flex-direction: column;
    background: #0d121a;
    padding: 20px;
    overflow: hidden;
    position: relative;
}

.terminal-header {
    display: flex;
    justify-content: space-between;
    margin-bottom: 10px;
    padding-bottom: 10px;
    border-bottom: 1px solid #1b2433;
    font-family: var(--mono);
    font-size: 12px;
    color: #567;
}

#terminal-content {
    flex: 1;
    font-family: var(--mono);
    font-size: 14px;
    line-height: 1.6;
    color: #cde4ff;
    overflow-y: auto;
    white-space: pre-wrap;
    padding-right: 10px;
}

/* Scrollbar styling */
::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: #0b0f14; }
::-webkit-scrollbar-thumb { background: #1b2433; border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: #2b3a50; }

</style>
</head>
<body>

<header class="header">
  <div class="brand">
    <div class="badge">GENESIS V2</div>
    <div class="title neon">Arquitectura de Orquestacion</div>
  </div>
  <div style="font: 12px var(--mono); color: #567;">SYSVEC: 0xAetherShadowUnbreakable</div>
</header>

<div id="genesis-interface">
    <div class="sidebar" id="agent-sidebar">
        <h3>Agentes Disponibles</h3>
        <!-- Buttons injected by JS -->
    </div>
    
    <div class="terminal-window">
        <div class="terminal-header">
            <span>TERMINAL OUTPUT</span>
            <span>STATUS: ACTIVE</span>
        </div>
        <div id="terminal-content">
            > SYSTEM INITIALIZED.
            > WAITING FOR AGENT SELECTION...
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
