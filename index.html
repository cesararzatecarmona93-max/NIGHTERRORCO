<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="description" content="Protocolo Genesis V2: Arquitectura de Orquestación y Llaves Maestras">
<title>Protocolo Genesis V2</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-container">
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="brand-badge">Genesis V2</div>
      <div class="brand-title">Orquestación & Llaves Maestras</div>
    </div>
    <ul id="agent-list" class="agent-list">
      <!-- Agent items will be injected here by script.js -->
    </ul>
  </aside>

  <main class="main-content">
    <div id="details-container" class="panel">
      <h2 id="agent-title">Agent Name</h2>
      <span id="agent-role" class="agent-meta">Agent Role</span>
      <p id="agent-desc" class="description">Agent Description</p>

      <div class="prompt-container">
        <button id="copy-btn" class="copy-btn">Copy Prompt</button>
        <pre id="agent-prompt"></pre>
      </div>
    </div>
  </main>
</div>

<script src="script.js"></script>
</body>
</html>
