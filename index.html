<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Genesis V2: Arquitectura de Orquestacion</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0f14;
            --sidebar-bg: #10151d;
            --text-color: #e6f1ff;
            --accent-color: #00d1ff;
            --secondary-accent: #a24cff;
            --terminal-bg: #0e1622;
            --border-color: #1b2433;
            --font-mono: 'Fira Code', monospace;
            --font-sans: 'Inter', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-sans);
            background-color: var(--bg-color);
            color: var(--text-color);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        .container {
            display: grid;
            grid-template-columns: 280px 1fr;
            width: 100%;
            height: 100%;
        }

        /* Sidebar */
        .sidebar {
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .sidebar-header {
            font-family: var(--font-mono);
            font-weight: 700;
            font-size: 1.2rem;
            color: var(--accent-color);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .agent-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .agent-item {
            padding: 12px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid transparent;
            font-size: 0.9rem;
            opacity: 0.7;
        }

        .agent-item:hover {
            background-color: rgba(0, 209, 255, 0.1);
            opacity: 1;
        }

        .agent-item.active {
            background-color: rgba(0, 209, 255, 0.15);
            border-color: var(--accent-color);
            opacity: 1;
            font-weight: 600;
        }

        .agent-name {
            display: block;
            margin-bottom: 4px;
        }

        .agent-role {
            font-size: 0.75rem;
            color: #8fb3ff;
            font-family: var(--font-mono);
        }

        /* Main Content */
        .main-content {
            display: flex;
            flex-direction: column;
            padding: 20px;
            gap: 20px;
            overflow: hidden;
        }

        .terminal-window {
            flex: 1;
            background-color: var(--terminal-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            font-family: var(--font-mono);
            font-size: 0.9rem;
            overflow-y: auto;
            white-space: pre-wrap;
            color: #cde4ff;
            position: relative;
        }

        .terminal-header {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 30px;
            background: rgba(16, 21, 29, 0.9);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            padding: 0 10px;
            font-size: 0.7rem;
            color: #567;
        }

        .input-area {
            display: flex;
            gap: 10px;
            height: 120px;
        }

        textarea {
            flex: 1;
            background-color: var(--sidebar-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px;
            color: var(--text-color);
            font-family: var(--font-mono);
            resize: none;
            outline: none;
        }

        textarea:focus {
            border-color: var(--accent-color);
        }

        button {
            width: 100px;
            background: linear-gradient(135deg, var(--accent-color), var(--secondary-accent));
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s;
        }

        button:active {
            transform: scale(0.98);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-color);
        }
        ::-webkit-scrollbar-thumb {
            background: #2a3b55;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #3a4d6b;
        }
    </style>
</head>
<body>
    <div class="container">
        <aside class="sidebar">
            <div class="sidebar-header">Protocolo Genesis V2</div>
            <ul class="agent-list" id="agentList">
                <!-- Agents will be populated by JS -->
            </ul>
        </aside>

        <main class="main-content">
            <div class="terminal-window" id="outputDisplay">
                <div class="terminal-header">TERMINAL OUTPUT // SYS.VEC.CONNECTED</div>
                <div id="terminalContent">Select an agent to begin...</div>
            </div>

            <div class="input-area">
                <textarea id="userInput" placeholder="Enter your instruction here..."></textarea>
                <button id="runBtn">EJECUTAR</button>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
