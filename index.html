<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Genesis V2 Protocol - Orchestration Architecture</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0b0f14; --panel:#10151d; --ink:#e6f1ff;
  --cyan:#00d1ff; --vio:#a24cff; --grid:#0e1622;
  --ok:#2de3a7; --warn:#ffbe3b;
  --mono: 'Fira Code', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  --sans: 'Inter', system-ui, -apple-system, sans-serif;
}
*{box-sizing:border-box}
html,body{height:100%; margin:0; overflow:hidden;}
body{
  background: var(--bg);
  color: var(--ink);
  font-family: var(--sans);
  display: flex;
}
.sidebar{
  width: 300px;
  background: var(--panel);
  border-right: 1px solid var(--grid);
  display: flex;
  flex-direction: column;
  padding: 20px;
  gap: 12px;
}
.brand{
  font-family: var(--mono);
  font-weight: 700;
  font-size: 14px;
  letter-spacing: 1px;
  color: var(--cyan);
  margin-bottom: 20px;
  text-transform: uppercase;
}
.agent-btn{
  padding: 12px;
  border: 1px solid var(--grid);
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.2s;
  background: rgba(14,22,34,0.5);
}
.agent-btn:hover{
  border-color: var(--cyan);
  background: rgba(0,209,255,0.05);
}
.agent-btn.active{
  border-color: var(--vio);
  background: rgba(162,76,255,0.1);
  box-shadow: 0 0 15px rgba(162,76,255,0.1);
}
.agent-name{
  font-weight: 600;
  font-size: 13px;
  color: #fff;
}
.agent-role{
  font-size: 11px;
  color: #8899ac;
  margin-top: 4px;
}
.main-area{
  flex: 1;
  display: flex;
  flex-direction: column;
  background: radial-gradient(circle at center, #0e1219 0%, #0b0f14 100%);
  position: relative;
}
.terminal-window{
  flex: 1;
  padding: 40px;
  overflow-y: auto;
  font-family: var(--mono);
  font-size: 13px;
  line-height: 1.6;
}
.system-line{
  color: var(--cyan);
  margin-bottom: 12px;
  white-space: pre-wrap;
}
.user-line{
  color: var(--ok);
  margin: 20px 0 12px;
  font-weight: 600;
}
.processing{
  color: var(--warn);
  animation: blink 1s infinite;
}
@keyframes blink{50%{opacity:0.5}}
.input-area{
  padding: 20px 40px;
  background: var(--panel);
  border-top: 1px solid var(--grid);
}
#user-input{
  width: 100%;
  background: #080c11;
  border: 1px solid #1e2a3c;
  border-radius: 8px;
  color: var(--ink);
  font-family: var(--mono);
  padding: 14px;
  font-size: 13px;
  outline: none;
}
#user-input:focus{
  border-color: var(--cyan);
  box-shadow: 0 0 0 2px rgba(0,209,255,0.1);
}
/* Matrix bg effect container if needed, sticking to simple gradient for now as per mvp */
</style>
</head>
<body>

<aside class="sidebar">
  <div class="brand">Genesis V2 Protocol</div>
  <div id="agent-sidebar">
    <!-- populated by js -->
  </div>
</aside>

<main class="main-area">
  <div id="terminal-output" class="terminal-window"></div>
  <div class="input-area">
    <input type="text" id="user-input" placeholder="Enter command or instruction..." autocomplete="off">
  </div>
</main>

<script src="script.js"></script>
</body>
</html>
