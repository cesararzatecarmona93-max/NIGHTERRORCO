<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Protocolo Genesis V2</title>
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0b0f14; --panel: #10151d; --ink: #e6f1ff;
  --cyan: #00d1ff; --vio: #a24cff; --grid: #0e1622;
  --ok: #2de3a7; --warn: #ffbe3b;
  --mono: 'Fira Code', monospace;
  --sans: 'Inter', sans-serif;
}
* { box-sizing: border-box; }
body {
  margin: 0; background: var(--bg); color: var(--ink); font-family: var(--sans);
  height: 100vh; display: grid; grid-template-columns: 280px 1fr;
  overflow: hidden;
}
.sidebar {
  background: var(--panel); border-right: 1px solid #1b2433; padding: 20px;
  overflow-y: auto; display: flex; flex-direction: column; gap: 10px;
}
.brand {
  font-size: 18px; font-weight: 700; margin-bottom: 20px; color: var(--cyan);
  text-transform: uppercase; letter-spacing: 1px;
}
.agent-item {
  padding: 12px; border-radius: 8px; cursor: pointer; transition: all 0.2s;
  border: 1px solid transparent; background: #0e121a;
}
.agent-item:hover { background: #151b28; border-color: #1b2433; }
.agent-item.active {
  background: linear-gradient(90deg, rgba(0,209,255,0.1), transparent);
  border-left: 3px solid var(--cyan);
}
.agent-name { font-weight: 600; font-size: 14px; color: #fff; }
.agent-role { font-size: 11px; color: #8fb3ff; margin-top: 4px; }
.terminal-window {
  background: #080b0f; padding: 20px; font-family: var(--mono);
  display: flex; flex-direction: column; overflow: hidden; position: relative;
}
.output-area {
  flex: 1; overflow-y: auto; white-space: pre-wrap; color: #cde4ff; font-size: 13px; line-height: 1.6;
  padding-bottom: 20px;
}
.output-area::-webkit-scrollbar { width: 8px; }
.output-area::-webkit-scrollbar-track { background: #0d121a; }
.output-area::-webkit-scrollbar-thumb { background: #1b2433; border-radius: 4px; }
.input-area {
  margin-top: auto; border-top: 1px solid #1b2433; padding-top: 20px; display: flex; gap: 10px;
}
textarea {
  flex: 1; background: #0d121a; border: 1px solid #1b2433; color: #fff;
  padding: 12px; border-radius: 8px; font-family: var(--sans); resize: none; outline: none;
  font-size: 14px;
}
textarea:focus { border-color: var(--cyan); box-shadow: 0 0 0 2px rgba(0,209,255,0.1); }
button {
  background: var(--cyan); color: #000; border: none; padding: 0 24px;
  border-radius: 8px; font-weight: 700; cursor: pointer; transition: 0.2s;
  font-family: var(--sans); text-transform: uppercase; letter-spacing: 0.5px;
}
button:hover { background: #33d9ff; transform: translateY(-1px); }
button:active { transform: translateY(0); }
.status-bar {
  position: absolute; top: 0; right: 0; padding: 10px; font-size: 11px; color: #567;
  font-family: var(--mono); pointer-events: none;
}
</style>
</head>
<body>
<div class="sidebar">
  <div class="brand">Genesis V2</div>
  <div id="agent-list"></div>
</div>
<div class="terminal-window">
  <div class="status-bar">SYSVEC: 0xAetherShadowUnbreakable | MODE: ACTIVE</div>
  <div id="output" class="output-area"></div>
  <div class="input-area">
    <textarea id="user-input" rows="3" placeholder="Enter instructions here..."></textarea>
    <button id="exec-btn">Execute</button>
  </div>
</div>
<script src="script.js"></script>
</body>
</html>
