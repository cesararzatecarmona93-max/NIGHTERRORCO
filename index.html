<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Genesis V2 Protocol | Orchestration</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <!-- Styles -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Background Canvas -->
    <canvas id="matrix-canvas"></canvas>

    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="brand">Genesis V2</div>
            </div>
            <ul id="agent-list" class="agent-list">
                <!-- Injected via JS -->
            </ul>
        </aside>

        <!-- Main Terminal -->
        <main class="terminal-area">
            <div id="terminal-header" class="active-agent-header">
                <!-- Injected via JS -->
            </div>

            <div id="terminal-output" class="terminal-window">
                <!-- Messages go here -->
            </div>

            <div class="input-area">
                <input type="text" id="user-input" placeholder="Enter command or prompt..." autocomplete="off">
                <button id="send-btn">Execute</button>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
