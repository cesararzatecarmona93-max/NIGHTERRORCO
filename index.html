<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Protocolo Genesis V2: Orquestación</title>
    <style>
        :root {
            --bg: #0b0f14;
            --panel: #10151d;
            --cyan: #00d1ff;
            --vio: #a24cff;
            --grid: #0e1622;
            --ok: #2de3a7;
            --warn: #ffbe3b;
            --ink: #e6f1ff;
            --mono: 'Fira Code', 'Courier New', monospace;
            --sans: 'Inter', system-ui, sans-serif;
        }
        body {
            margin: 0;
            background-color: var(--bg);
            color: var(--ink);
            font-family: var(--sans);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }
        #genesis-interface {
            display: grid;
            grid-template-columns: 300px 1fr;
            width: 100%;
            height: 100%;
        }
        .sidebar {
            background-color: var(--panel);
            border-right: 1px solid var(--grid);
            display: flex;
            flex-direction: column;
            padding: 20px;
            overflow-y: auto;
        }
        .sidebar-header {
            font-size: 14px;
            color: var(--cyan);
            font-family: var(--mono);
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid var(--grid);
            padding-bottom: 10px;
        }
        .agent-item {
            padding: 15px;
            margin-bottom: 10px;
            border: 1px solid var(--grid);
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            background: rgba(16, 21, 29, 0.5);
        }
        .agent-item:hover {
            border-color: var(--cyan);
            background: rgba(0, 209, 255, 0.05);
        }
        .agent-item.active {
            border-color: var(--vio);
            background: rgba(162, 76, 255, 0.1);
            box-shadow: 0 0 15px rgba(162, 76, 255, 0.1);
        }
        .agent-name {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 4px;
        }
        .agent-role {
            font-size: 11px;
            color: #8899aa;
            font-family: var(--mono);
        }
        .terminal-window {
            padding: 30px;
            display: flex;
            flex-direction: column;
            background: radial-gradient(circle at center, #151b28 0%, #0b0f14 100%);
        }
        .terminal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--grid);
            padding-bottom: 15px;
        }
        .terminal-header .title {
            font-size: 24px;
            font-weight: 700;
            color: var(--ink);
            text-shadow: 0 0 10px rgba(0, 209, 255, 0.3);
        }
        .terminal-header .badge {
            font-family: var(--mono);
            font-size: 12px;
            color: var(--ok);
            border: 1px solid var(--ok);
            padding: 4px 8px;
            border-radius: 4px;
        }
        .terminal-content {
            flex: 1;
            font-family: var(--mono);
            font-size: 13px;
            line-height: 1.6;
            color: #a9c1ff;
            background: rgba(0, 0, 0, 0.3);
            padding: 20px;
            border-radius: 8px;
            border: 1px solid var(--grid);
            overflow-y: auto;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
    <div id="genesis-interface">
        <div class="sidebar">
            <div class="sidebar-header">GENESIS V2 // AGENTS</div>
            <!-- Agents injected by JS -->
        </div>
        <div class="terminal-window">
            <div class="terminal-header">
                <div class="title">System Ready</div>
                <div class="badge">STANDBY</div>
            </div>
            <div class="terminal-content">Initializing Protocolo Genesis V2...</div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
