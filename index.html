<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Genesis V2: Orchestration Architecture</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0b0f14;
  --panel: #10151d;
  --cyan: #00d1ff;
  --vio: #a24cff;
  --grid: #0e1622;
  --ok: #2de3a7;
  --warn: #ffbe3b;
  --ink: #e6f1ff;
  --mono: 'Fira Code', monospace;
  --sans: 'Inter', sans-serif;
}
body {
  margin: 0;
  background: var(--bg);
  color: var(--ink);
  font-family: var(--sans);
  overflow: hidden;
}
#matrix-bg {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: -1;
  opacity: 0.15;
}
.container {
  display: grid;
  grid-template-columns: 280px 1fr;
  height: 100vh;
  gap: 2px;
  background: var(--grid);
}
.sidebar {
  background: var(--panel);
  padding: 20px;
  border-right: 1px solid #1b2433;
  display: flex;
  flex-direction: column;
  gap: 12px;
  z-index: 1;
}
.agent-card {
  padding: 12px;
  background: rgba(255, 255, 255, 0.03);
  border: 1px solid #1b2433;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.2s;
}
.agent-card:hover {
  background: rgba(0, 209, 255, 0.05);
  border-color: var(--cyan);
}
.agent-card.active {
  background: rgba(0, 209, 255, 0.1);
  border-color: var(--cyan);
  box-shadow: 0 0 15px rgba(0, 209, 255, 0.15);
}
.agent-name {
  font-family: var(--mono);
  font-weight: 600;
  color: var(--cyan);
  font-size: 13px;
  margin-bottom: 4px;
}
.agent-role {
  font-size: 11px;
  color: #8fb3ff;
}
.terminal-window {
  background: rgba(11, 15, 20, 0.95);
  padding: 24px;
  display: flex;
  flex-direction: column;
  position: relative;
  overflow: hidden;
}
.terminal-header {
  display: flex;
  justify-content: space-between;
  border-bottom: 1px solid #1b2433;
  padding-bottom: 12px;
  margin-bottom: 12px;
  font-family: var(--mono);
  font-size: 12px;
  color: #567;
}
#terminal-output {
  flex: 1;
  font-family: var(--mono);
  font-size: 13px;
  line-height: 1.6;
  color: #cde4ff;
  white-space: pre-wrap;
  overflow-y: auto;
  padding-right: 10px;
}
.input-area {
  margin-top: 12px;
  border-top: 1px solid #1b2433;
  padding-top: 12px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.prompt-marker {
  color: var(--ok);
  font-family: var(--mono);
  font-weight: bold;
}
input[type="text"] {
  background: transparent;
  border: none;
  color: var(--ink);
  font-family: var(--mono);
  font-size: 14px;
  flex: 1;
  outline: none;
}
</style>
</head>
<body>
<canvas id="matrix-bg"></canvas>
<div class="container">
  <div class="sidebar">
    <div style="margin-bottom: 20px;">
      <h1 style="font-size: 18px; margin: 0; color: #fff;">GENESIS V2</h1>
      <div style="font-size: 11px; color: #567; font-family: var(--mono);">ORCHESTRATION PROTOCOL</div>
    </div>

    <div id="agent-list">
      <!-- Agent cards will be injected here via JS or hardcoded -->
    </div>
  </div>

  <div class="terminal-window">
    <div class="terminal-header">
      <span>SYSVEC: 0xAetherShadowUnbreakable</span>
      <span>STATUS: ACTIVE</span>
      <span>MODE: GOD_MODE</span>
    </div>
    <div id="terminal-output">
      > SYSTEM INITIALIZED...
      > WAITING FOR AGENT SELECTION...
    </div>
    <div class="input-area">
      <span class="prompt-marker">root@genesis:~$</span>
      <input type="text" placeholder="Enter command..." autofocus>
    </div>
  </div>
</div>

<script src="script.js"></script>
<script>
  // Initialize UI
  const agentList = document.getElementById('agent-list');

  Object.values(AGENTS).forEach(agent => {
    const card = document.createElement('div');
    card.className = 'agent-card';
    card.dataset.id = agent.id;
    card.onclick = () => {
        // Stop any previous typing
        if (typeof processingTimeout !== 'undefined') clearTimeout(processingTimeout);
        // Call the global function
        selectAgent(agent.id);
    };
    
    card.innerHTML = `
      <div class="agent-name">${agent.name}</div>
      <div class="agent-role">${agent.role}</div>
    `;
    agentList.appendChild(card);
  });

  // Start Matrix Rain
  startMatrixRain('matrix-bg');
</script>
</body>
</html>
