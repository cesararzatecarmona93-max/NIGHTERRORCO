<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="description" content="Protocolo Genesis V2: Arquitectura de Orquestacion y Llaves Maestras.">
<title>GENESIS V2 - ORCHESTRATION ARCHITECTURE</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<canvas id="matrix-canvas"></canvas>

<div class="main-interface">
  <header class="sys-header">
    <div class="sys-badge">SYSVEC: 0xAetherShadow</div>
    <div class="sys-title">GENESIS V2 PROTOCOL</div>
    <div class="sys-status">STATUS: GOD_MODE</div>
  </header>

  <div class="terminal-container">
    <div id="terminal-output" class="terminal-output">
      <!-- Output stream will appear here -->
    </div>
    <div class="input-line">
      <span class="prompt-char">></span>
      <input type="text" id="command-input" placeholder="Enter instruction or /command..." autocomplete="off" spellcheck="false">
    </div>
  </div>

  <footer class="sys-footer">
    <div>AGENTS: CONTEXT_ENGINEER | SECURITY_AUDITOR | SALES_STRATEGIST | LEGAL_SENTINEL</div>
    <div>VERSION 2.0.4 // BLACK_TIER</div>
  </footer>
</div>

<script src="script.js"></script>
</body>
</html>
