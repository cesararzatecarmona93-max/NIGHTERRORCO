<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Genesis V2: Protocolo de Orquestación</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500;600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0f14;
            --panel: #10151d;
            --ink: #e6f1ff;
            --cyan: #00d1ff;
            --vio: #a24cff;
            --grid: #0e1622;
            --ok: #2de3a7;
            --warn: #ffbe3b;
            --mono: 'Fira Code', monospace;
            --sans: 'Inter', sans-serif;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            background-color: var(--bg);
            color: var(--ink);
            font-family: var(--sans);
            height: 100vh;
            display: grid;
            grid-template-columns: 260px 1fr;
            overflow: hidden;
        }

        /* Sidebar Styles */
        .sidebar {
            background-color: var(--panel);
            border-right: 1px solid var(--grid);
            display: flex;
            flex-direction: column;
            padding: 20px;
            overflow-y: auto;
        }

        .brand {
            font-family: var(--mono);
            font-weight: 700;
            font-size: 1.2rem;
            color: var(--cyan);
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .brand span {
            color: var(--vio);
        }

        .agent-list {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .agent-item {
            padding: 12px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid transparent;
            font-size: 0.9rem;
            opacity: 0.7;
        }

        .agent-item:hover {
            background-color: rgba(0, 209, 255, 0.05);
            border-color: rgba(0, 209, 255, 0.2);
            opacity: 1;
        }

        .agent-item.active {
            background-color: rgba(0, 209, 255, 0.1);
            border-color: var(--cyan);
            color: var(--cyan);
            opacity: 1;
            font-weight: 600;
        }

        .agent-role {
            font-size: 0.75rem;
            color: #8899ac;
            margin-top: 4px;
            display: block;
            font-family: var(--mono);
        }

        /* Main Content Styles */
        .main-content {
            display: flex;
            flex-direction: column;
            height: 100vh;
            position: relative;
        }

        /* Header */
        .header {
            padding: 20px 30px;
            border-bottom: 1px solid var(--grid);
            background: rgba(11, 15, 20, 0.95);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .active-agent-info h2 {
            margin: 0;
            font-size: 1.1rem;
            color: var(--ink);
        }

        .sys-vec {
            font-family: var(--mono);
            font-size: 0.75rem;
            color: var(--warn);
            margin-top: 4px;
            display: block;
        }

        /* Terminal Window */
        .terminal-window {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
            font-family: var(--mono);
            font-size: 0.9rem;
            line-height: 1.6;
            color: #a9c1ff;
            background: radial-gradient(circle at 50% 50%, #0f1520 0%, #0b0f14 100%);
        }

        .message {
            margin-bottom: 20px;
            white-space: pre-wrap;
        }

        .message.user {
            color: var(--ok);
            border-left: 2px solid var(--ok);
            padding-left: 15px;
        }

        .message.system {
            color: var(--ink);
        }

        .cursor::after {
            content: '▋';
            animation: blink 1s infinite;
            color: var(--cyan);
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* Input Area */
        .input-area {
            padding: 20px 30px;
            border-top: 1px solid var(--grid);
            background-color: var(--panel);
        }

        .input-container {
            display: flex;
            gap: 15px;
            background: #080a0e;
            border: 1px solid #1e2a3c;
            border-radius: 12px;
            padding: 12px;
            transition: border-color 0.2s;
        }

        .input-container:focus-within {
            border-color: var(--cyan);
            box-shadow: 0 0 0 2px rgba(0, 209, 255, 0.1);
        }

        textarea {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--ink);
            font-family: var(--mono);
            font-size: 0.9rem;
            resize: none;
            outline: none;
            height: 60px; /* Initial height */
        }

        button.send-btn {
            background: linear-gradient(135deg, rgba(0, 209, 255, 0.2), rgba(162, 76, 255, 0.2));
            border: 1px solid var(--cyan);
            color: var(--cyan);
            border-radius: 8px;
            padding: 0 20px;
            cursor: pointer;
            font-family: var(--mono);
            font-weight: 600;
            transition: all 0.2s;
        }

        button.send-btn:hover {
            background: linear-gradient(135deg, rgba(0, 209, 255, 0.3), rgba(162, 76, 255, 0.3));
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(0, 209, 255, 0.2);
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg);
        }
        ::-webkit-scrollbar-thumb {
            background: #1e2a3c;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #2b3d55;
        }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="brand">GENESIS<span>V2</span></div>
        <ul class="agent-list" id="agent-list">
            <!-- Agents will be injected here via JS -->
        </ul>
    </aside>

    <main class="main-content">
        <header class="header">
            <div class="active-agent-info" id="agent-header">
                <h2>Inicializando Protocolo...</h2>
                <span class="sys-vec">SysVec: N/A</span>
            </div>
        </header>

        <div class="terminal-window" id="terminal">
            <div class="message system">
                > PROTOCOLO GENESIS V2 INICIADO...<br>
                > CARGANDO AGENTES...<br>
                > ESPERANDO SELECCIÓN...
            </div>
        </div>

        <div class="input-area">
            <div class="input-container">
                <textarea id="user-input" placeholder="Ingrese instrucción para el agente... (Shift+Enter para enviar)"></textarea>
                <button class="send-btn" id="send-btn">EJECUTAR</button>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
